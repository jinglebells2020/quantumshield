id: QS-DES-001
name: DES Cipher
description: DES uses 56-bit keys and is completely broken
severity: critical
quantum_threat: weakened_by_grover
category: symmetric_encryption
replacement: AES-256-GCM
patterns:
  - language: java
    type: regex
    patterns:
      - 'Cipher\.getInstance\("DES"'
      - 'KeyGenerator\.getInstance\("DES"'
      - 'SecretKeySpec\(.*"DES"'
    message: "DES in Java — 56-bit keys, completely broken, replace with AES-256"
  - language: go
    type: regex
    patterns:
      - 'des\.NewCipher\('
    message: "DES usage detected — replace with AES-256"
  - language: python
    type: regex
    patterns:
      - 'DES\.new\('
      - 'algorithms\.DES\b'
    message: "DES in Python — replace with AES-256"
