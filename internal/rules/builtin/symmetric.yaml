id: QS-AES128-001
name: AES-128 Usage
description: AES-128 provides only 64-bit quantum security via Grover's algorithm
severity: medium
quantum_threat: weakened_by_grover
category: symmetric_encryption
replacement: AES-256
patterns:
  - language: go
    type: regex
    patterns:
      - 'aes\.NewCipher\('
      - 'cipher\.NewGCM\('
      - 'cipher\.NewCBCEncrypter\('
      - 'cipher\.NewCBCDecrypter\('
    message: "AES usage detected — verify key size is 256-bit for quantum resistance"
  - language: python
    type: regex
    patterns:
      - 'AES\.new\('
      - 'algorithms\.AES\('
      - 'Fernet\('
    message: "AES usage in Python — verify 256-bit keys for quantum resistance"
  - language: javascript
    type: regex
    patterns:
      - "crypto\\.createCipheriv\\(['\"]aes-128"
      - "crypto\\.createDecipheriv\\(['\"]aes-128"
    message: "AES-128 in Node.js — upgrade to AES-256 for quantum resistance"
