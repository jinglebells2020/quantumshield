id: QS-3DES-001
name: Triple DES Usage
description: 3DES is weak and provides minimal quantum security
severity: high
quantum_threat: weakened_by_grover
category: symmetric_encryption
replacement: AES-256
patterns:
  - language: go
    type: regex
    patterns:
      - 'des\.NewTripleDESCipher\('
      - '"crypto/des"'
    message: "3DES usage detected — replace with AES-256"
  - language: python
    type: regex
    patterns:
      - 'DES3\.new\('
      - 'algorithms\.TripleDES\('
    message: "3DES in Python — replace with AES-256"
  - language: java
    type: regex
    patterns:
      - 'Cipher\.getInstance\("DESede'
      - 'KeyGenerator\.getInstance\("DESede'
      - 'SecretKeySpec\(.*"DESede"'
    message: "3DES (DESede) in Java — replace with AES-256"
  - language: javascript
    type: regex
    patterns:
      - "crypto\\.createCipheriv\\(['\"]des-ede3"
    message: "3DES in Node.js — replace with AES-256"
